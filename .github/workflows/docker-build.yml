name: Build and Push JARVIS Container
#this is updated3
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert repository name to lowercase
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

   test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Create persistent data directory
        run: mkdir -p /tmp/jarvis_data

      - name: Pull and run container
        run: |
          docker run -d --name jarvis -p 5000:5000 \
            -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            -e TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }} \
            -v /tmp/jarvis_data:/data \
            ghcr.io/${{ github.repository_owner }}/jarvis_container:latest
          sleep 5
          echo "=== First request (should store memory) ==="
          curl -X POST http://localhost:5000/ask -H "Content-Type: application/json" -d '{"question":"My name is Rahul"}' || true
          echo "=== Second request (should recall name) ==="
          curl -X POST http://localhost:5000/ask -H "Content-Type: application/json" -d '{"question":"What is my name?"}' || true
          echo "=== Container logs ==="
          docker logs jarvislogs ==="
          docker logs jarvis
