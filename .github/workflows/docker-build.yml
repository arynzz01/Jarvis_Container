name: Build and Push JARVIS Container

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert repository name to lowercase
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Pull and run container
        run: |
          docker run -d --name jarvis -p 5000:5000 ghcr.io/${{ github.repository_owner }}/jarvis_container:latest
          sleep 5
          echo "=== Testing /ask endpoint ==="
          curl -X POST http://localhost:5000/ask -H "Content-Type: application/json" -d '{"question":"Hello JARVIS"}' || true
          echo "=== Container logs ==="
          docker logs jarvis
